<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TikTok OAuth Callback</title>
<style>
body { font-family: monospace; background:#111; color:#0f0; padding:40px; }
textarea { width:100%; height:120px; font-size:16px; background:#000; color:#0f0; padding:10px; }
</style>
</head>
<body>
<h2>TikTok 인증 완료</h2>
<p>아래 code 값을 복사해서 파이썬 스크립트에 붙여넣으세요.</p>
<textarea id="out" readonly></textarea>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code') || '(no code found in URL)';
document.getElementById('out').value = code;
</script>
</body>
</html>
